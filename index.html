<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundarya Beauty Academy & Store</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Lato:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Lato',sans-serif;
  background:#fff5f8;
}

header{
  background:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.logo{
  font-family:'Montserrat';
  font-weight:700;
  color:#d81b60;
  font-size:14px;
}

.nav{
  font-size:12px;
  display:flex;
  gap:10px;
}

.nav div{
  cursor:pointer;
}

.section{
  padding:15px;
  display:none;
}

.active{
  display:block;
}

.card{
  background:white;
  border-radius:10px;
  padding:10px;
  margin-bottom:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  border-radius:8px;
}

button{
  width:100%;
  padding:8px;
  margin-top:8px;
  background:#d81b60;
  color:white;
  border:none;
  border-radius:6px;
}

input, textarea{
  width:100%;
  padding:8px;
  margin-bottom:8px;
  box-sizing:border-box;
}

.admin-panel{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:90%;
  background:white;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  box-shadow:0 -5px 20px rgba(0,0,0,0.2);
  display:none;
  overflow:auto;
  padding:15px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  width:95%;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">Soundarya Beauty Academy</div>
<div class="nav">
<div onclick="showSection('home')">Home</div>
<div onclick="showSection('academy')">Academy</div>
<div onclick="adminLogin()">Admin</div>
</div>
</header>

<!-- HOME -->
<div id="home" class="section active">
<h3>Our Products</h3>
<div id="productsContainer"></div>
</div>

<!-- PRODUCT MODAL -->
<div id="productModal" class="modal">
<div class="modal-box">
<div id="productDetail"></div>
<button onclick="closeProduct()">Close</button>
</div>
</div>

<!-- ACADEMY -->
<div id="academy" class="section">
<h3>Student Login</h3>
<input id="studentID" placeholder="Student ID">
<input id="studentPass" type="password" placeholder="Password">
<button onclick="studentLogin()">Login</button>
<div id="studentData"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin-panel">
<h3>Admin Panel</h3>

<h4>Add Product</h4>
<input id="pTitle" placeholder="Title">
<input id="pPrice" placeholder="Price">
<input id="pMRP" placeholder="MRP">
<textarea id="pDesc" placeholder="Description"></textarea>
<input id="pImg1" placeholder="Image Link">
<button onclick="saveProduct()">Save Product</button>

<hr>

<h4>Add Student</h4>
<input id="sID" placeholder="Student ID">
<input id="sName" placeholder="Name">
<input id="sMobile" placeholder="Mobile">
<input id="sCourse" placeholder="Course">
<input id="sTotal" placeholder="Total Fees">
<input id="sPaid" placeholder="Fees Paid">
<input id="sCert" placeholder="Certificate Link">
<input id="sNotes" placeholder="Notes Link">
<input id="sYT" placeholder="YouTube Course">
<input id="sPass" placeholder="Password">
<button onclick="saveStudent()">Save Student</button>

<button onclick="hideAdmin()">Close</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, addDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqLAI7c-yqMeAyNZFh75KU5NKA5sSh800",
  authDomain: "store-12869.firebaseapp.com",
  projectId: "store-12869"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.showSection = (id)=>{
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
};

window.adminLogin = ()=>{
  const pass = prompt("Enter Password");
  if(pass==="8430"){
    document.getElementById("adminPanel").style.display="block";
  }
};

window.hideAdmin = ()=>{
  document.getElementById("adminPanel").style.display="none";
};

async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));
  const container = document.getElementById("productsContainer");
  container.innerHTML="";
  snap.forEach(docSnap=>{
    const d = docSnap.data();
    container.innerHTML+=`
      <div class="card" onclick="openProduct('${docSnap.id}')">
        <img src="${d.images ? d.images[0] : ''}">
        <h4>${d.title}</h4>
        <p>₹${d.price}</p>
      </div>
    `;
  });
}
loadProducts();

window.openProduct = async(id)=>{
  const snap = await getDoc(doc(db,"products",id));
  const d = snap.data();
  document.getElementById("productDetail").innerHTML=`
    <h3>${d.title}</h3>
    <p>${d.description}</p>
    <p><strike>₹${d.mrp}</strike> ₹${d.price}</p>
  `;
  document.getElementById("productModal").style.display="flex";
};

window.closeProduct = ()=>{
  document.getElementById("productModal").style.display="none";
};

window.saveProduct = async()=>{
  await addDoc(collection(db,"products"),{
    title:document.getElementById("pTitle").value,
    price:document.getElementById("pPrice").value,
    mrp:document.getElementById("pMRP").value,
    description:document.getElementById("pDesc").value,
    images:[document.getElementById("pImg1").value]
  });
  alert("Product Saved");
  loadProducts();
};

window.saveStudent = async()=>{
  await setDoc(doc(db,"students",document.getElementById("sID").value),{
    name:document.getElementById("sName").value,
    mobile:document.getElementById("sMobile").value,
    course:document.getElementById("sCourse").value,
    totalFees:document.getElementById("sTotal").value,
    feesPaid:document.getElementById("sPaid").value,
    certificateLink:document.getElementById("sCert").value,
    notesLink:document.getElementById("sNotes").value,
    youtubeCourse:document.getElementById("sYT").value,
    password:document.getElementById("sPass").value
  });
  alert("Student Saved");
};

window.studentLogin = async()=>{
  const id = document.getElementById("studentID").value;
  const pass = document.getElementById("studentPass").value;
  const snap = await getDoc(doc(db,"students",id));
  if(!snap.exists()) return alert("Student Not Found");
  const d = snap.data();
  if(d.password !== pass) return alert("Wrong Password");

  document.getElementById("studentData").innerHTML=`
    <h4>${d.name}</h4>
    <p>${d.mobile}</p>
    <p>${d.course}</p>
    <p>Total Fees: ${d.totalFees}</p>
    <p>Paid: ${d.feesPaid}</p>
    <a href="${d.certificateLink}" target="_blank">Certificate</a><br>
    <a href="${d.notesLink}" target="_blank">Notes</a><br>
    <a href="${d.youtubeCourse}" target="_blank">Online Course</a>
  `;
};
</script>

</body>
</html>
